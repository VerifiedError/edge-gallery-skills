<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Location</title>
</head>
<body>
<script>
// Race getCurrentPosition against a manual 3s timeout. The native `timeout`
// option only fires AFTER the permission prompt resolves (W3C spec), so in
// a hidden WebView it can hang forever.
function getGPS() {
  const HARD = 3000;
  const native = new Promise((resolve, reject) => {
    if (!('geolocation' in navigator)) return reject(new Error('no geolocation'));
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude, acc: Math.round(p.coords.accuracy) }),
      (e) => reject(new Error('GPS ' + e.code + ': ' + e.message)),
      { enableHighAccuracy: true, timeout: HARD, maximumAge: 60000 }
    );
  });
  const to = new Promise((_, rej) => setTimeout(() => rej(new Error('GPS hard timeout')), HARD));
  return Promise.race([native, to]);
}

async function getIPFallback() {
  const r = await fetch('https://ipapi.co/json/', { cache: 'no-store' });
  if (!r.ok) throw new Error('ipapi.co ' + r.status);
  const j = await r.json();
  if (!j.latitude || !j.longitude) throw new Error('ipapi.co returned no coords');
  return { lat: j.latitude, lon: j.longitude, city: j.city, region: j.region, country: j.country_name };
}

async function reverseGeocode(lat, lon) {
  try {
    const url = 'https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=18&addressdetails=1&lat=' + lat + '&lon=' + lon;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    return j.display_name || null;
  } catch (e) {
    return null;
  }
}

window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    let loc;
    let source = 'gps';
    try {
      loc = await getGPS();
    } catch (e) {
      source = 'ip';
      loc = await getIPFallback();
    }

    const lines = [];
    if (source === 'gps') {
      lines.push('Current location (GPS):');
    } else {
      lines.push('Approximate location (IP-based):');
    }
    const address = await reverseGeocode(loc.lat, loc.lon);
    if (address) {
      lines.push(address);
    } else if (loc.city || loc.region || loc.country) {
      lines.push([loc.city, loc.region, loc.country].filter(Boolean).join(', '));
    }
    lines.push('Coordinates: ' + loc.lat.toFixed(6) + ', ' + loc.lon.toFixed(6));
    if (loc.acc != null) {
      lines.push('Accuracy: ~' + loc.acc + ' m');
    }

    return JSON.stringify({ result: lines.join('\n') });
  } catch (e) {
    console.error(e);
    return JSON.stringify({ error: 'Could not determine location: ' + e.message });
  }
};
</script>
</body>
</html>
