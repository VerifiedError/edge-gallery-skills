<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nearby Places</title>
</head>
<body>
<script>
const TYPE_MAP = {
  cafe:        { key: 'amenity', value: 'cafe' },
  atm:         { key: 'amenity', value: 'atm' },
  restaurant:  { key: 'amenity', value: 'restaurant' },
  fast_food:   { key: 'amenity', value: 'fast_food' },
  fuel:        { key: 'amenity', value: 'fuel' },
  pharmacy:    { key: 'amenity', value: 'pharmacy' },
  bank:        { key: 'amenity', value: 'bank' },
  hospital:    { key: 'amenity', value: 'hospital' },
  hotel:       { key: 'tourism', value: 'hotel' },
  supermarket: { key: 'shop',    value: 'supermarket' },
  park:        { key: 'leisure', value: 'park' },
};

function getGPS() {
  const HARD = 3000;
  const native = new Promise((resolve, reject) => {
    if (!('geolocation' in navigator)) return reject(new Error('no geolocation'));
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
      (e) => reject(new Error('GPS ' + e.code + ': ' + e.message)),
      { enableHighAccuracy: true, timeout: HARD, maximumAge: 60000 }
    );
  });
  const to = new Promise((_, rej) => setTimeout(() => rej(new Error('GPS hard timeout')), HARD));
  return Promise.race([native, to]);
}

async function getIPFallback() {
  const r = await fetch('https://ipapi.co/json/', { cache: 'no-store' });
  const j = await r.json();
  if (!j.latitude || !j.longitude) throw new Error('ipapi.co no coords');
  return { lat: j.latitude, lon: j.longitude };
}

function distM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2
          + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function formatAddress(tags) {
  const parts = [];
  if (tags['addr:housenumber'] && tags['addr:street']) {
    parts.push(tags['addr:housenumber'] + ' ' + tags['addr:street']);
  } else if (tags['addr:street']) {
    parts.push(tags['addr:street']);
  }
  if (tags['addr:city']) parts.push(tags['addr:city']);
  return parts.join(', ') || null;
}

window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const params = JSON.parse(data || '{}');
    const typeName = (params.type || '').toLowerCase().trim();
    if (!typeName) throw new Error('type parameter is required');
    const radius = Math.min(Math.max(parseInt(params.radius_m || 1500, 10), 100), 5000);
    const limit = 8;

    const tag = TYPE_MAP[typeName] || { key: 'amenity', value: typeName };

    let origin;
    try {
      origin = await getGPS();
    } catch (e) {
      origin = await getIPFallback();
    }

    const query = '[out:json][timeout:20];('
      + 'node[' + tag.key + '=' + tag.value + '](around:' + radius + ',' + origin.lat + ',' + origin.lon + ');'
      + 'way[' + tag.key + '=' + tag.value + '](around:' + radius + ',' + origin.lat + ',' + origin.lon + ');'
      + ');out center tags 50;';

    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(query),
    });
    if (!r.ok) throw new Error('Overpass ' + r.status);
    const j = await r.json();

    const places = [];
    for (const el of (j.elements || [])) {
      const lat = el.lat != null ? el.lat : (el.center ? el.center.lat : null);
      const lon = el.lon != null ? el.lon : (el.center ? el.center.lon : null);
      if (lat == null || lon == null) continue;
      const tags = el.tags || {};
      places.push({
        name: tags.name || tags['brand'] || '(unnamed)',
        distM: Math.round(distM(origin.lat, origin.lon, lat, lon)),
        addr: formatAddress(tags),
      });
    }
    places.sort((a, b) => a.distM - b.distM);
    const top = places.slice(0, limit);

    if (top.length === 0) {
      return JSON.stringify({ result: 'No ' + typeName + ' found within ' + radius + ' m. Try a larger radius.' });
    }

    const lines = ['Nearest ' + typeName + ' (within ' + radius + ' m):'];
    top.forEach((p, i) => {
      const distStr = p.distM < 1000 ? (p.distM + ' m') : ((p.distM / 1000).toFixed(1) + ' km');
      let line = (i + 1) + '. ' + p.name + ' — ' + distStr;
      if (p.addr) line += '\n   ' + p.addr;
      lines.push(line);
    });
    return JSON.stringify({ result: lines.join('\n') });
  } catch (e) {
    console.error(e);
    return JSON.stringify({ error: 'Could not find nearby places: ' + e.message });
  }
};
</script>
</body>
</html>
