<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wi-Fi QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>
<script>
function escapeWifi(s) {
  if (s == null) return '';
  return String(s).replace(/([\\;,":])/g, '\\$1');
}

function buildWifiURI(ssid, password, security, hidden) {
  const sec = (security || 'WPA').toUpperCase();
  const secVal = (sec === 'NOPASS' || sec === 'NONE' || sec === '') ? 'nopass' : sec;
  let uri = 'WIFI:T:' + secVal + ';S:' + escapeWifi(ssid) + ';';
  if (secVal !== 'nopass') uri += 'P:' + escapeWifi(password || '') + ';';
  uri += 'H:' + (hidden ? 'true' : 'false') + ';;';
  return uri;
}

async function waitForQRCode(timeoutMs) {
  const start = Date.now();
  while (typeof QRCode === 'undefined' || typeof QRCode.toDataURL !== 'function') {
    if (Date.now() - start > timeoutMs) throw new Error('QRCode library failed to load');
    await new Promise(r => setTimeout(r, 100));
  }
}

window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const params = JSON.parse(data || '{}');
    if (!params.ssid) throw new Error('ssid is required');

    const payload = buildWifiURI(params.ssid, params.password || '', params.security || 'WPA', !!params.hidden);

    await waitForQRCode(5000);

    // Keep the FULL data URL (data:image/png;base64,...) — matches the built-in qr-code skill contract.
    const dataUrl = await QRCode.toDataURL(payload, {
      errorCorrectionLevel: 'M',
      margin: 2,
      width: 512,
      color: { dark: '#000000', light: '#ffffff' },
    });

    const secLabel = (params.security || 'WPA').toUpperCase() === 'NOPASS' ? 'open' : (params.security || 'WPA').toUpperCase();
    return JSON.stringify({
      result: 'Wi-Fi QR for "' + params.ssid + '" (' + secLabel + '). Scan with your phone camera to join. Reminder: this QR contains the password in plain text — don\'t share it publicly.',
      image: { base64: dataUrl },
    });
  } catch (e) {
    console.error(e);
    return JSON.stringify({ error: 'Could not generate QR: ' + e.message });
  }
};
</script>
</body>
</html>
