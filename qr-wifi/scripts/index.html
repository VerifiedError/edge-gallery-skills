<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>qr-wifi</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>
<script>
/*
 * qr-wifi — Build a WIFI: URI and render it as a PNG QR code.
 * Wi-Fi QR format (Android + iOS camera both support):
 *   WIFI:T:<WPA|WEP|nopass>;S:<ssid>;P:<password>;H:<true|false>;;
 * Special chars \ ; , " : must be escaped with backslash inside SSID/password.
 */

function escapeWifi(s) {
  if (s == null) return '';
  return String(s).replace(/([\\;,":])/g, '\\$1');
}

function buildWifiURI(ssid, password, security, hidden) {
  const sec = (security || 'WPA').toUpperCase();
  const secVal = (sec === 'NOPASS' || sec === 'NONE' || sec === '') ? 'nopass' : sec;
  let uri = 'WIFI:T:' + secVal + ';S:' + escapeWifi(ssid) + ';';
  if (secVal !== 'nopass') uri += 'P:' + escapeWifi(password || '') + ';';
  uri += 'H:' + (hidden ? 'true' : 'false') + ';;';
  return uri;
}

// Wait for the QRCode global to show up (script loads async)
async function waitForQRCode(timeoutMs) {
  const start = Date.now();
  while (typeof QRCode === 'undefined' || typeof QRCode.toDataURL !== 'function') {
    if (Date.now() - start > timeoutMs) throw new Error('QRCode library failed to load');
    await new Promise(r => setTimeout(r, 100));
  }
}

window.ai_edge_gallery_get_result = async function (data, secret) {
  const out = { result: '', image: null, payload: null, error: null };
  try {
    const params = (data && typeof data === 'string') ? JSON.parse(data || '{}') : (data || {});
    const ssid = params.ssid;
    if (!ssid) throw new Error('ssid is required');
    const security = params.security || 'WPA';
    const password = params.password || '';
    const hidden = !!params.hidden;

    const payload = buildWifiURI(ssid, password, security, hidden);
    out.payload = payload;

    await waitForQRCode(5000);

    // Generate a 512x512 PNG data URL
    const dataUrl = await QRCode.toDataURL(payload, {
      errorCorrectionLevel: 'M',
      margin: 2,
      width: 512,
      color: { dark: '#000000', light: '#ffffff' },
    });

    // Strip the "data:image/png;base64," prefix
    const b64 = dataUrl.replace(/^data:image\/png;base64,/, '');
    out.image = { base64: b64, mime: 'image/png' };

    const secLabel = security.toLowerCase() === 'nopass' ? 'open' : security.toUpperCase();
    out.result = 'Wi-Fi QR code generated for "' + ssid + '" (' + secLabel + '). '
               + 'Scan with your phone camera to join. '
               + 'Reminder: this QR contains the password in plain text — '
               + 'don\'t share it publicly.';
  } catch (e) {
    out.error = String(e && e.message ? e.message : e);
    out.result = 'Could not generate QR: ' + out.error;
  }
  return JSON.stringify(out);
};
</script>
</body></html>
