<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Time Is It</title>
</head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const params = JSON.parse(data || '{}');
    const tz = params.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
    const now = new Date();

    const friendly = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true,
    }).format(now);

    const offPart = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, timeZoneName: 'shortOffset',
    }).formatToParts(now).find(p => p.type === 'timeZoneName');
    const offset = offPart ? offPart.value.replace('GMT', 'UTC') : '';

    // DST check: compare Jan vs Jul offset vs current
    const jan = new Date(now.getFullYear(), 0, 1);
    const jul = new Date(now.getFullYear(), 6, 1);
    const getOffMin = (d) => {
      const part = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, timeZoneName: 'shortOffset',
      }).formatToParts(d).find(p => p.type === 'timeZoneName');
      if (!part) return 0;
      const m = part.value.match(/([+-])(\d{1,2})(?::?(\d{2}))?/);
      if (!m) return 0;
      return (m[1] === '-' ? -1 : 1) * (parseInt(m[2], 10) * 60 + parseInt(m[3] || '0', 10));
    };
    const standard = Math.max(getOffMin(jan), getOffMin(jul));
    const current = getOffMin(now);
    const isDst = current !== standard;

    const lines = [
      friendly,
      'Timezone: ' + tz + (offset ? ' (' + offset + ')' : '') + (isDst ? ' — DST in effect' : ''),
    ];

    return JSON.stringify({ result: lines.join('\n') });
  } catch (e) {
    console.error(e);
    return JSON.stringify({ error: 'Could not determine time: ' + e.message });
  }
};
</script>
</body>
</html>
